name: Next.js CI + Selenium & Appium E2E Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: mysql://localhost:3306/db

    - name: Run typecheck
      run: npx tsc --noEmit

    - name: Build project
      run: npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: mysql://localhost:3306/db

    - name: Install Chrome
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: 'stable'

    - name: Build application
      run: npm run build
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: Start application server
      run: |
        npm start &
        sleep 10
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

    - name: Run Web E2E Tests
      run: node tests/run_e2e.js
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: Run Backend API Tests
      if: always()
      run: node tests/run_backend_tests.js
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: Run Mobile WebView E2E Tests
      if: always()
      run: node tests/run_mobile_e2e.js
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: Upload E2E Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apptestingreport
        path: apptestingreport.xlsx

    - name: Compile Unified Test Summary
      if: always()
      run: node tests/generate_summary.js
