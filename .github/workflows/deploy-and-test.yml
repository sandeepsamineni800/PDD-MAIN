name: deploy-and-test.yml

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Next.js Web App
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: mysql://localhost:3306/db

    - name: Run typecheck
      run: npx tsc --noEmit

    - name: Build project
      run: npm run build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Prepare static export config and strip API routes
      run: |
        # Use next.config.export.ts config
        cp next.config.export.ts next.config.ts
        # Move api directory entirely outside of the app folder so static export succeeds
        mv app/api ./api_temp
        # Move dynamic dashboard directory out during build to bypass generateStaticParams restrictions
        mv app/dashboard/domains/\[domainId\] ./domain_temp

    - name: Build static website
      run: npm run build
      env:
        DATABASE_URL: mysql://localhost:3306/db
        JWT_SECRET: mocksecret

    - name: Deploy to GitHub Pages 🚀
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out

    - name: Output deployment link
      run: |
        URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        echo "Website URL: $URL"
        echo "## 🚀 GitHub Pages Deployment Status" >> $GITHUB_STEP_SUMMARY
        echo "Successfully deployed PDD Core Scheduler to GitHub Pages." >> $GITHUB_STEP_SUMMARY
        echo "🔗 **Live Website Link**: [$URL]($URL)" >> $GITHUB_STEP_SUMMARY

  verify:
    name: Verify Live Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
    - name: Verify Live Deployment
      run: |
        URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        echo "Verifying deployment status for $URL..."
        # Send a quick request to verify the static site is live
        curl --silent --fail --head "$URL" || { echo "URL verification failed"; exit 1; }
        echo "Deployment is live and responsive at $URL."
        echo "## 🔍 Deployment Verification" >> $GITHUB_STEP_SUMMARY
        echo "Verification checks passed successfully." >> $GITHUB_STEP_SUMMARY
        echo "🔗 **Verified Live Link**: [$URL]($URL)" >> $GITHUB_STEP_SUMMARY

  selenium-tests:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: verify
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: mysql://localhost:3306/db

    - name: Install Chrome
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: 'stable'

    - name: Build application
      run: npm run build
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: Start application server
      run: |
        npm start &
        sleep 10
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: Run Selenium + Appium Test Suite (310 Tests)
      run: node tests/selenium/test_runner.js
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        TARGET_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    - name: Upload Selenium Test Results JSON
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: selenium-test-results
        path: tests/selenium/test_results.json

    - name: Upload E2E Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apptestingreport
        path: apptestingreport.xlsx
